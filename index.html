<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德语字母学习 - Deutsch Alphabet</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f0 0%, #fef3e8 20%, #f0faf0 40%, #e8f4fd 60%, #f3e8ff 80%, #fce4ec 100%);
    color: #37474f;
    padding: 2rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, #e64980, #f59f00, #40c057, #339af0, #7950f2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }

  header p {
    font-size: 1rem;
    color: #78909c;
  }

  header .hint {
    margin-top: 0.8rem;
    font-size: 0.85rem;
    color: #adb5bd;
  }

  .card[data-color="0"] .uppercase { color: #e64980; }
  .card[data-color="0"].special { border-color: rgba(230,73,128,0.25); background: rgba(230,73,128,0.06); }
  .card[data-color="1"] .uppercase { color: #f76707; }
  .card[data-color="1"].special { border-color: rgba(247,103,7,0.25); background: rgba(247,103,7,0.06); }
  .card[data-color="2"] .uppercase { color: #f59f00; }
  .card[data-color="2"].special { border-color: rgba(245,159,0,0.25); background: rgba(245,159,0,0.06); }
  .card[data-color="3"] .uppercase { color: #40c057; }
  .card[data-color="3"].special { border-color: rgba(64,192,87,0.25); background: rgba(64,192,87,0.06); }
  .card[data-color="4"] .uppercase { color: #20c997; }
  .card[data-color="4"].special { border-color: rgba(32,201,151,0.25); background: rgba(32,201,151,0.06); }
  .card[data-color="5"] .uppercase { color: #339af0; }
  .card[data-color="5"].special { border-color: rgba(51,154,240,0.25); background: rgba(51,154,240,0.06); }
  .card[data-color="6"] .uppercase { color: #7950f2; }
  .card[data-color="6"].special { border-color: rgba(121,80,242,0.25); background: rgba(121,80,242,0.06); }
  .card[data-color="7"] .uppercase { color: #f06595; }
  .card[data-color="7"].special { border-color: rgba(240,101,149,0.25); background: rgba(240,101,149,0.06); }

  .card[data-color="0"] .letter-zone:active,
  .card[data-color="0"] .letter-zone.active { background: rgba(230,73,128,0.08); }
  .card[data-color="1"] .letter-zone:active,
  .card[data-color="1"] .letter-zone.active { background: rgba(247,103,7,0.08); }
  .card[data-color="2"] .letter-zone:active,
  .card[data-color="2"] .letter-zone.active { background: rgba(245,159,0,0.08); }
  .card[data-color="3"] .letter-zone:active,
  .card[data-color="3"] .letter-zone.active { background: rgba(64,192,87,0.08); }
  .card[data-color="4"] .letter-zone:active,
  .card[data-color="4"] .letter-zone.active { background: rgba(32,201,151,0.08); }
  .card[data-color="5"] .letter-zone:active,
  .card[data-color="5"] .letter-zone.active { background: rgba(51,154,240,0.08); }
  .card[data-color="6"] .letter-zone:active,
  .card[data-color="6"] .letter-zone.active { background: rgba(121,80,242,0.08); }
  .card[data-color="7"] .letter-zone:active,
  .card[data-color="7"] .letter-zone.active { background: rgba(240,101,149,0.08); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 1rem;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    position: relative;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 0;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card .letter-zone {
    padding: 1.2rem 0.8rem 0.6rem;
    cursor: pointer;
    transition: background 0.15s ease;
    border-radius: 16px 16px 0 0;
  }

  .card .letter-zone:active,
  .card .letter-zone.active {
    background: rgba(46,125,50,0.1);
  }

  .card .word-zone {
    padding: 0.4rem 0.8rem 0.8rem;
    cursor: pointer;
    transition: background 0.15s ease;
    border-radius: 0 0 16px 16px;
    border-top: 1px solid rgba(0,0,0,0.04);
  }

  .card .word-zone:active,
  .card .word-zone.active {
    background: rgba(0,0,0,0.04);
  }

  .card .uppercase {
    font-size: 2.2rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .card .lowercase {
    font-size: 1.3rem;
    color: #90a4ae;
    line-height: 1;
    margin-bottom: 0.6rem;
  }

  .card .word {
    font-size: 0.9rem;
    color: #455a64;
    font-weight: 500;
    display: inline;
  }

  .card .word .speaker {
    display: inline-block;
    margin-left: 4px;
    font-size: 0.75rem;
    opacity: 0.4;
    transition: opacity 0.15s;
  }

  .card .word-zone:hover .speaker {
    opacity: 0.8;
  }

  .card .translation {
    font-size: 0.75rem;
    color: #90a4ae;
    margin-top: 0.15rem;
  }

  .card .key-hint {
    position: absolute;
    top: 6px;
    right: 8px;
    font-size: 0.65rem;
    background: rgba(0,0,0,0.04);
    padding: 1px 6px;
    border-radius: 4px;
    color: #b0bec5;
    z-index: 1;
  }

  .keyboard-hint {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: #b0bec5;
    line-height: 1.8;
  }

  .keyboard-hint kbd {
    display: inline-block;
    background: rgba(255,255,255,0.7);
    border: 1px solid #cfd8dc;
    border-radius: 4px;
    padding: 0 6px;
    font-family: inherit;
    font-size: 0.75rem;
    color: #78909c;
    margin: 0 2px;
  }

  .card.special {
    position: relative;
  }

  .card.special::after {
    content: 'Umlaut';
    position: absolute;
    bottom: 6px;
    right: 6px;
    font-size: 0.55rem;
    color: rgba(0,0,0,0.15);
  }

  @media (max-width: 600px) {
    body { padding: 1rem; }
    header h1 { font-size: 1.6rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.7rem; }
    .card .letter-zone { padding: 0.8rem 0.5rem 0.4rem; }
    .card .word-zone { padding: 0.3rem 0.5rem 0.6rem; }
    .card .uppercase { font-size: 1.8rem; }
  }
</style>
</head>
<body>
<header>
  <h1>Deutsch Alphabet</h1>
  <p>德语字母学习</p>
  <p class="hint">点击字母区域读字母 · 点击单词区域读单词 · 按键盘对应键读字母</p>
</header>

<div class="grid" id="grid"></div>

<div class="keyboard-hint" id="keyboardHint"></div>

<script>
  const letters = [
    { upper: 'A', lower: 'a', word: 'Apfel', trans: '苹果', key: 'a' },
    { upper: 'B', lower: 'b', word: 'Bär', trans: '熊', key: 'b' },
    { upper: 'C', lower: 'c', word: 'Computer', trans: '电脑', key: 'c' },
    { upper: 'D', lower: 'd', word: 'Dose', trans: '罐头', key: 'd' },
    { upper: 'E', lower: 'e', word: 'Elefant', trans: '大象', key: 'e' },
    { upper: 'F', lower: 'f', word: 'Fisch', trans: '鱼', key: 'f' },
    { upper: 'G', lower: 'g', word: 'Gitarre', trans: '吉他', key: 'g' },
    { upper: 'H', lower: 'h', word: 'Haus', trans: '房子', key: 'h' },
    { upper: 'I', lower: 'i', word: 'Insel', trans: '岛屿', key: 'i' },
    { upper: 'J', lower: 'j', word: 'Jacke', trans: '夹克', key: 'j' },
    { upper: 'K', lower: 'k', word: 'Kaffee', trans: '咖啡', key: 'k' },
    { upper: 'L', lower: 'l', word: 'Lampe', trans: '灯', key: 'l' },
    { upper: 'M', lower: 'm', word: 'Maus', trans: '老鼠', key: 'm' },
    { upper: 'N', lower: 'n', word: 'Nase', trans: '鼻子', key: 'n' },
    { upper: 'O', lower: 'o', word: 'Ohr', trans: '耳朵', key: 'o' },
    { upper: 'P', lower: 'p', word: 'Pilz', trans: '蘑菇', key: 'p' },
    { upper: 'Q', lower: 'q', word: 'Quelle', trans: '源头', key: 'q' },
    { upper: 'R', lower: 'r', word: 'Rose', trans: '玫瑰', key: 'r' },
    { upper: 'S', lower: 's', word: 'Sonne', trans: '太阳', key: 's' },
    { upper: 'T', lower: 't', word: 'Tisch', trans: '桌子', key: 't' },
    { upper: 'U', lower: 'u', word: 'Uhr', trans: '钟', key: 'u' },
    { upper: 'V', lower: 'v', word: 'Vogel', trans: '鸟', key: 'v' },
    { upper: 'W', lower: 'w', word: 'Wasser', trans: '水', key: 'w' },
    { upper: 'X', lower: 'x', word: 'Xylophon', trans: '木琴', key: 'x' },
    { upper: 'Y', lower: 'y', word: 'Yoga', trans: '瑜伽', key: 'y' },
    { upper: 'Z', lower: 'z', word: 'Zeit', trans: '时间', key: 'z' },
    { upper: 'Ä', lower: 'ä', word: 'Ärger', trans: '生气', key: 'ä', specialKey: '[' },
    { upper: 'Ö', lower: 'ö', word: 'Öl', trans: '油', key: 'ö', specialKey: ']' },
    { upper: 'Ü', lower: 'ü', word: 'Über', trans: '超越', key: 'ü', specialKey: '\\' },
    { upper: 'ß', lower: 'ss', word: 'Straße', trans: '街道', key: 'ß', specialKey: '-' },
  ];

  const grid = document.getElementById('grid');
  const hintBar = document.getElementById('keyboardHint');

  const specialBindings = [];
  const keyMap = {};

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    u.rate = 0.85;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  const COLORS = 8;

  function buildCards() {
    letters.forEach((l, idx) => {
      const card = document.createElement('div');
      const colorIdx = idx % COLORS;
      card.className = 'card' + (l.specialKey ? ' special' : '');
      card.dataset.index = idx;
      card.dataset.color = colorIdx;

      const keyLabel = l.specialKey || l.key;

      card.innerHTML = `
        <div class="key-hint">${keyLabel}</div>
        <div class="letter-zone" data-action="letter">
          <div class="uppercase">${l.upper}</div>
          <div class="lowercase">${l.lower}</div>
        </div>
        <div class="word-zone" data-action="word">
          <div class="word">${l.word} <span class="speaker">🔊</span></div>
          <div class="translation">${l.trans}</div>
        </div>
      `;

      const letterZone = card.querySelector('.letter-zone');
      const wordZone = card.querySelector('.word-zone');

      letterZone.addEventListener('click', (e) => {
        e.stopPropagation();
        speak(l.upper);
        letterZone.classList.add('active');
        setTimeout(() => letterZone.classList.remove('active'), 250);
      });

      wordZone.addEventListener('click', (e) => {
        e.stopPropagation();
        speak(l.word);
        wordZone.classList.add('active');
        setTimeout(() => wordZone.classList.remove('active'), 250);
      });

      grid.appendChild(card);

      if (l.specialKey) {
        specialBindings.push({ key: l.specialKey, letter: l, index: idx });
        keyMap[l.specialKey] = idx;
      }
      keyMap[l.key] = idx;
    });
  }

  function buildHint() {
    let html = '按键映射：<kbd>a</kbd>–<kbd>z</kbd> 对应 A–Z';
    specialBindings.forEach(({ key, letter }) => {
      html += ` &nbsp; <kbd>${key === '\\' ? '\\\\' : key}</kbd> → ${letter.upper}`;
    });
    hintBar.innerHTML = html;
  }

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const key = e.key.toLowerCase();
    const idx = keyMap[key];
    if (idx === undefined) return;

    const cards = grid.children;
    const card = cards[idx];
    if (!card) return;

    const letter = letters[idx];
    speak(letter.upper);
    const letterZone = card.querySelector('.letter-zone');
    letterZone.classList.add('active');
    setTimeout(() => letterZone.classList.remove('active'), 250);

    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  buildCards();
  buildHint();
</script>
</body>
</html>
