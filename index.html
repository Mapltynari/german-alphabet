<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>德语学习 - Deutsch Lernen</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #fff0f0 0%, #fef3e8 20%, #f0faf0 40%, #e8f4fd 60%, #f3e8ff 80%, #fce4ec 100%);
    color: #37474f;
    padding: 1.5rem;
  }

  header {
    text-align: center;
    margin-bottom: 1.2rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    background: linear-gradient(90deg, #e64980, #f59f00, #40c057, #339af0, #7950f2);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.3rem;
  }

  header p { font-size: 0.95rem; color: #78909c; }
  header .hint { margin-top: 0.5rem; font-size: 0.8rem; color: #adb5bd; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.5rem;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 0.2rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 0.5rem 1.2rem;
    border-radius: 20px;
    border: none;
    font-size: 0.85rem;
    font-weight: 500;
    cursor: pointer;
    background: rgba(255,255,255,0.5);
    color: #78909c;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .tab:hover { background: rgba(255,255,255,0.8); color: #37474f; }
  .tab.active {
    background: #fff;
    color: #2e7d32;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .section { display: none; }
  .section.active { display: block; }

  .section-title {
    font-size: 0.75rem;
    color: #adb5bd;
    text-align: center;
    letter-spacing: 0.15em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 0.9rem;
    max-width: 1100px;
    margin: 0 auto;
  }
  .grid.wide { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }

  .card {
    position: relative;
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.6);
    border-radius: 16px;
    padding: 0;
    text-align: center;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .card .letter-zone {
    padding: 1rem 0.6rem 0.5rem;
    cursor: pointer;
    transition: background 0.15s ease;
    border-radius: 16px 16px 0 0;
  }
  .card .letter-zone:active, .card .letter-zone.active { background: rgba(0,0,0,0.04); }

  .card .word-zone {
    padding: 0.4rem 0.6rem 0.7rem;
    cursor: pointer;
    transition: background 0.15s ease;
    border-radius: 0 0 16px 16px;
    border-top: 1px solid rgba(0,0,0,0.04);
  }
  .card .word-zone:active, .card .word-zone.active { background: rgba(0,0,0,0.04); }

  .card .main-text {
    font-size: 1.6rem;
    font-weight: 700;
    line-height: 1.3;
  }
  .card .sub-text {
    font-size: 0.95rem;
    color: #90a4ae;
    line-height: 1.2;
    margin-bottom: 0.4rem;
  }
  .card .word { font-size: 0.85rem; color: #455a64; font-weight: 500; }
  .card .trans { font-size: 0.7rem; color: #90a4ae; margin-top: 0.1rem; }
  .card .key-hint {
    position: absolute; top: 5px; right: 7px;
    font-size: 0.6rem; background: rgba(0,0,0,0.04);
    padding: 1px 5px; border-radius: 4px; color: #b0bec5; z-index: 1;
  }
  .card .badge {
    display: inline-block;
    font-size: 0.55rem;
    padding: 1px 7px;
    border-radius: 8px;
    margin-bottom: 0.3rem;
    color: #fff;
  }

  /* Color themes */
  .card[data-color="0"] .main-text { color: #e64980; }
  .card[data-color="1"] .main-text { color: #f76707; }
  .card[data-color="2"] .main-text { color: #f59f00; }
  .card[data-color="3"] .main-text { color: #40c057; }
  .card[data-color="4"] .main-text { color: #20c997; }
  .card[data-color="5"] .main-text { color: #339af0; }
  .card[data-color="6"] .main-text { color: #7950f2; }
  .card[data-color="7"] .main-text { color: #f06595; }

  .card[data-color="0"] .letter-zone:active, .card[data-color="0"] .letter-zone.active { background: rgba(230,73,128,0.08); }
  .card[data-color="1"] .letter-zone:active, .card[data-color="1"] .letter-zone.active { background: rgba(247,103,7,0.08); }
  .card[data-color="2"] .letter-zone:active, .card[data-color="2"] .letter-zone.active { background: rgba(245,159,0,0.08); }
  .card[data-color="3"] .letter-zone:active, .card[data-color="3"] .letter-zone.active { background: rgba(64,192,87,0.08); }
  .card[data-color="4"] .letter-zone:active, .card[data-color="4"] .letter-zone.active { background: rgba(32,201,151,0.08); }
  .card[data-color="5"] .letter-zone:active, .card[data-color="5"] .letter-zone.active { background: rgba(51,154,240,0.08); }
  .card[data-color="6"] .letter-zone:active, .card[data-color="6"] .letter-zone.active { background: rgba(121,80,242,0.08); }
  .card[data-color="7"] .letter-zone:active, .card[data-color="7"] .letter-zone.active { background: rgba(240,101,149,0.08); }

  @media (max-width: 600px) {
    body { padding: 0.8rem; }
    header h1 { font-size: 1.5rem; }
    .tab { padding: 0.4rem 0.9rem; font-size: 0.78rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.6rem; }
    .grid.wide { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    .card .main-text { font-size: 1.3rem; }
  }
</style>
</head>
<body>

<header>
  <h1>Deutsch Lernen</h1>
  <p>德语学习</p>
  <p class="hint">点击上方字母 / 下方单词发音 · 键盘 A–Z 读字母</p>
</header>

<div class="tabs" id="tabs"></div>

<div id="alphabet-section" class="section active">
  <div class="section-title">Das Alphabet · 字母表</div>
  <div class="grid" id="alphabet-grid"></div>
</div>

<div id="phonics-section" class="section">
  <div class="section-title">Aussprache · 发音组合</div>
  <div class="grid" id="phonics-grid"></div>
</div>

<div id="numbers-section" class="section">
  <div class="section-title">Zahlen · 数字</div>
  <div class="grid" id="numbers-grid"></div>
</div>

<div id="phrases-section" class="section">
  <div class="section-title">Redewendungen · 日常短语</div>
  <div class="grid wide" id="phrases-grid"></div>
</div>

<div id="vocab-section" class="section">
  <div class="section-title">Wortschatz · 基础词汇</div>
  <div class="grid wide" id="vocab-grid"></div>
</div>

<div class="keyboard-hint" id="keyboardHint" style="text-align:center;margin-top:1.5rem;font-size:0.75rem;color:#b0bec5;"></div>

<script>
  const COLORS = 8;

  // ----- DATA -----
  const alphabet = [
    { upper: 'A', lower: 'a', word: 'Apfel', trans: '苹果', key: 'a' },
    { upper: 'B', lower: 'b', word: 'Bär', trans: '熊', key: 'b' },
    { upper: 'C', lower: 'c', word: 'Computer', trans: '电脑', key: 'c' },
    { upper: 'D', lower: 'd', word: 'Dose', trans: '罐头', key: 'd' },
    { upper: 'E', lower: 'e', word: 'Elefant', trans: '大象', key: 'e' },
    { upper: 'F', lower: 'f', word: 'Fisch', trans: '鱼', key: 'f' },
    { upper: 'G', lower: 'g', word: 'Gitarre', trans: '吉他', key: 'g' },
    { upper: 'H', lower: 'h', word: 'Haus', trans: '房子', key: 'h' },
    { upper: 'I', lower: 'i', word: 'Insel', trans: '岛屿', key: 'i' },
    { upper: 'J', lower: 'j', word: 'Jacke', trans: '夹克', key: 'j' },
    { upper: 'K', lower: 'k', word: 'Kaffee', trans: '咖啡', key: 'k' },
    { upper: 'L', lower: 'l', word: 'Lampe', trans: '灯', key: 'l' },
    { upper: 'M', lower: 'm', word: 'Maus', trans: '老鼠', key: 'm' },
    { upper: 'N', lower: 'n', word: 'Nase', trans: '鼻子', key: 'n' },
    { upper: 'O', lower: 'o', word: 'Ohr', trans: '耳朵', key: 'o' },
    { upper: 'P', lower: 'p', word: 'Pilz', trans: '蘑菇', key: 'p' },
    { upper: 'Q', lower: 'q', word: 'Quelle', trans: '源头', key: 'q' },
    { upper: 'R', lower: 'r', word: 'Rose', trans: '玫瑰', key: 'r' },
    { upper: 'S', lower: 's', word: 'Sonne', trans: '太阳', key: 's' },
    { upper: 'T', lower: 't', word: 'Tisch', trans: '桌子', key: 't' },
    { upper: 'U', lower: 'u', word: 'Uhr', trans: '钟', key: 'u' },
    { upper: 'V', lower: 'v', word: 'Vogel', trans: '鸟', key: 'v' },
    { upper: 'W', lower: 'w', word: 'Wasser', trans: '水', key: 'w' },
    { upper: 'X', lower: 'x', word: 'Xylophon', trans: '木琴', key: 'x' },
    { upper: 'Y', lower: 'y', word: 'Yoga', trans: '瑜伽', key: 'y' },
    { upper: 'Z', lower: 'z', word: 'Zeit', trans: '时间', key: 'z' },
    { upper: 'Ä', lower: 'ä', word: 'Ärger', trans: '生气', key: 'ä', specialKey: '[' },
    { upper: 'Ö', lower: 'ö', word: 'Öl', trans: '油', key: 'ö', specialKey: ']' },
    { upper: 'Ü', lower: 'ü', word: 'Über', trans: '超越', key: 'ü', specialKey: '\\' },
    { upper: 'ß', lower: 'ss', word: 'Straße', trans: '街道', key: 'ß', specialKey: '-' },
  ];

  const phonics = [
    { main: 'ch', sub: 'ch', word: 'Buch', trans: '书', desc: '软腭音' },
    { main: 'sch', sub: 'sch', word: 'Schule', trans: '学校', desc: '类似"sh"' },
    { main: 'sp', sub: 'sp', word: 'Sport', trans: '运动', desc: '读作"shp"' },
    { main: 'st', sub: 'st', word: 'Stein', trans: '石头', desc: '读作"sht"' },
    { main: 'ei', sub: 'ei', word: 'Ei', trans: '蛋', desc: '类似"eye"' },
    { main: 'ie', sub: 'ie', word: 'Liebe', trans: '爱', desc: '类似"ee"' },
    { main: 'eu', sub: 'eu', word: 'Eule', trans: '猫头鹰', desc: '类似"oy"' },
    { main: 'äu', sub: 'äu', word: 'Häuser', trans: '房子(复数)', desc: '同 eu' },
    { main: 'ck', sub: 'ck', word: 'Ecke', trans: '角落', desc: '硬"k"音' },
    { main: 'tz', sub: 'tz', word: 'Katze', trans: '猫', desc: '清"ts"音' },
    { main: 'pf', sub: 'pf', word: 'Pferd', trans: '马', desc: '双唇音' },
    { main: 'qu', sub: 'qu', word: 'Quelle', trans: '源头', desc: '读作"kv"' },
    { main: 'ng', sub: 'ng', word: 'singen', trans: '唱歌', desc: '鼻音' },
    { main: 'nk', sub: 'nk', word: 'trinken', trans: '喝', desc: 'nk 音' },
  ];

  const numbers = [
    { main: '0', sub: 'null', trans: '零' },
    { main: '1', sub: 'eins', trans: '一' },
    { main: '2', sub: 'zwei', trans: '二' },
    { main: '3', sub: 'drei', trans: '三' },
    { main: '4', sub: 'vier', trans: '四' },
    { main: '5', sub: 'fünf', trans: '五' },
    { main: '6', sub: 'sechs', trans: '六' },
    { main: '7', sub: 'sieben', trans: '七' },
    { main: '8', sub: 'acht', trans: '八' },
    { main: '9', sub: 'neun', trans: '九' },
    { main: '10', sub: 'zehn', trans: '十' },
    { main: '11', sub: 'elf', trans: '十一' },
    { main: '12', sub: 'zwölf', trans: '十二' },
    { main: '13', sub: 'dreizehn', trans: '十三' },
    { main: '14', sub: 'vierzehn', trans: '十四' },
    { main: '15', sub: 'fünfzehn', trans: '十五' },
    { main: '16', sub: 'sechzehn', trans: '十六' },
    { main: '17', sub: 'siebzehn', trans: '十七' },
    { main: '18', sub: 'achtzehn', trans: '十八' },
    { main: '19', sub: 'neunzehn', trans: '十九' },
    { main: '20', sub: 'zwanzig', trans: '二十' },
  ];

  const phrases = [
    { main: 'Hallo', sub: '', trans: '你好' },
    { main: 'Guten Morgen', sub: '', trans: '早上好' },
    { main: 'Guten Abend', sub: '', trans: '晚上好' },
    { main: 'Tschüss', sub: '', trans: '再见' },
    { main: 'Bitte', sub: '', trans: '请 / 不客气' },
    { main: 'Danke', sub: '', trans: '谢谢' },
    { main: 'Entschuldigung', sub: '', trans: '对不起 / 打扰一下' },
    { main: 'Ja', sub: '', trans: '是' },
    { main: 'Nein', sub: '', trans: '不是' },
    { main: 'Prost', sub: '', trans: '干杯' },
    { main: 'Wie geht\'s?', sub: '', trans: '你好吗？' },
    { main: 'Mir geht\'s gut', sub: '', trans: '我很好' },
    { main: 'Ich heiße ...', sub: '', trans: '我叫 ...' },
    { main: 'Wo ist ...?', sub: '', trans: '... 在哪里？' },
    { main: 'Ich verstehe nicht', sub: '', trans: '我不明白' },
    { main: 'Sprechen Sie Englisch?', sub: '', trans: '您会说英语吗？' },
  ];

  const vocab = [
    { main: 'rot', sub: 'red', trans: '红色', cat: '颜色' },
    { main: 'blau', sub: 'blue', trans: '蓝色', cat: '颜色' },
    { main: 'grün', sub: 'green', trans: '绿色', cat: '颜色' },
    { main: 'gelb', sub: 'yellow', trans: '黄色', cat: '颜色' },
    { main: 'schwarz', sub: 'black', trans: '黑色', cat: '颜色' },
    { main: 'weiß', sub: 'white', trans: '白色', cat: '颜色' },
    { main: 'braun', sub: 'brown', trans: '棕色', cat: '颜色' },
    { main: 'Mutter', sub: 'mother', trans: '母亲', cat: '家庭' },
    { main: 'Vater', sub: 'father', trans: '父亲', cat: '家庭' },
    { main: 'Schwester', sub: 'sister', trans: '姐妹', cat: '家庭' },
    { main: 'Bruder', sub: 'brother', trans: '兄弟', cat: '家庭' },
    { main: 'Oma', sub: 'grandma', trans: '奶奶/外婆', cat: '家庭' },
    { main: 'Brot', sub: 'bread', trans: '面包', cat: '食物' },
    { main: 'Milch', sub: 'milk', trans: '牛奶', cat: '食物' },
    { main: 'Wasser', sub: 'water', trans: '水', cat: '食物' },
    { main: 'Käse', sub: 'cheese', trans: '奶酪', cat: '食物' },
    { main: 'Apfel', sub: 'apple', trans: '苹果', cat: '食物' },
    { main: 'Montag', sub: 'Monday', trans: '星期一', cat: '星期' },
    { main: 'Dienstag', sub: 'Tuesday', trans: '星期二', cat: '星期' },
    { main: 'Mittwoch', sub: 'Wednesday', trans: '星期三', cat: '星期' },
    { main: 'Donnerstag', sub: 'Thursday', trans: '星期四', cat: '星期' },
    { main: 'Freitag', sub: 'Friday', trans: '星期五', cat: '星期' },
    { main: 'Samstag', sub: 'Saturday', trans: '星期六', cat: '星期' },
    { main: 'Sonntag', sub: 'Sunday', trans: '星期日', cat: '星期' },
    { main: 'eins', sub: 'one', trans: '一', cat: '数字' },
    { main: 'zwei', sub: 'two', trans: '二', cat: '数字' },
    { main: 'drei', sub: 'three', trans: '三', cat: '数字' },
  ];

  const catColors = { '颜色': '#e64980', '家庭': '#339af0', '食物': '#f59f00', '星期': '#7950f2', '数字': '#20c997' };

  // ----- TABS -----
  const tabs = [
    { id: 'alphabet', label: '字母表' },
    { id: 'phonics', label: '发音组合' },
    { id: 'numbers', label: '数字' },
    { id: 'phrases', label: '日常短语' },
    { id: 'vocab', label: '基础词汇' },
  ];

  const tabContainer = document.getElementById('tabs');
  tabs.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (t.id === 'alphabet' ? ' active' : '');
    btn.dataset.tab = t.id;
    btn.textContent = t.label;
    btn.addEventListener('click', () => switchTab(t.id));
    tabContainer.appendChild(btn);
  });

  function switchTab(id) {
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id + '-section'));
    location.hash = '#' + id;
  }

  if (location.hash) {
    const id = location.hash.slice(1);
    if (tabs.some(t => t.id === id)) switchTab(id);
  }

  // ----- SPEECH -----
  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'de-DE';
    u.rate = 0.85;
    u.pitch = 1;
    window.speechSynthesis.speak(u);
  }

  // ----- RENDER -----
  function renderCards(containerId, data, templateFn) {
    const grid = document.getElementById(containerId);
    data.forEach((item, idx) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.color = idx % COLORS;
      card.innerHTML = templateFn(item, idx);

      const letterZone = card.querySelector('.letter-zone');
      const wordZone = card.querySelector('.word-zone');

      if (letterZone) {
        letterZone.addEventListener('click', (e) => {
          e.stopPropagation();
          speak(item.main);
          letterZone.classList.add('active');
          setTimeout(() => letterZone.classList.remove('active'), 250);
        });
      }
      if (wordZone) {
        wordZone.addEventListener('click', (e) => {
          e.stopPropagation();
          speak(item.sub || item.main);
          wordZone.classList.add('active');
          setTimeout(() => wordZone.classList.remove('active'), 250);
        });
      }
      grid.appendChild(card);
    });
  }

  // Alphabet
  renderCards('alphabet-grid', alphabet, (l) => {
    const keyLabel = l.specialKey || l.key;
    return `
      <div class="key-hint">${keyLabel}</div>
      <div class="letter-zone">
        <div class="main-text">${l.upper}</div>
        <div class="sub-text">${l.lower}</div>
      </div>
      <div class="word-zone">
        <div class="word">${l.word}</div>
        <div class="trans">${l.trans}</div>
      </div>`;
  });

  // Phonics
  renderCards('phonics-grid', phonics, (p) => `
    <div class="letter-zone">
      <div class="main-text">${p.main}</div>
      <div class="sub-text">${p.desc}</div>
    </div>
    <div class="word-zone">
      <div class="word">${p.word}</div>
      <div class="trans">${p.trans}</div>
    </div>`);

  // Numbers
  renderCards('numbers-grid', numbers, (n) => `
    <div class="letter-zone">
      <div class="main-text">${n.main}</div>
    </div>
    <div class="word-zone">
      <div class="word">${n.sub}</div>
      <div class="trans">${n.trans}</div>
    </div>`);

  // Phrases
  renderCards('phrases-grid', phrases, (p) => `
    <div class="letter-zone">
      <div class="main-text" style="font-size:1rem;">${p.main}</div>
    </div>
    <div class="word-zone">
      <div class="trans" style="color:#455a64;">${p.trans}</div>
    </div>`);

  // Vocabulary
  renderCards('vocab-grid', vocab, (v) => `
    <div class="letter-zone">
      <div class="main-text">${v.main}</div>
      <div class="sub-text">${v.sub}</div>
    </div>
    <div class="word-zone">
      <span class="badge" style="background:${catColors[v.cat] || '#90a4ae'}">${v.cat}</span>
      <div class="trans">${v.trans}</div>
    </div>`);

  // ----- KEYBOARD -----
  const keyMap = {};
  alphabet.forEach((l, i) => {
    if (l.specialKey) keyMap[l.specialKey] = i;
    keyMap[l.key] = i;
  });

  const specialBindings = alphabet.filter(l => l.specialKey).map(l => ({ key: l.specialKey, upper: l.upper }));

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const key = e.key.toLowerCase();
    const idx = keyMap[key];
    if (idx === undefined) return;

    switchTab('alphabet');

    const cards = document.getElementById('alphabet-grid').children;
    const card = cards[idx];
    if (!card) return;

    speak(alphabet[idx].upper);
    const zone = card.querySelector('.letter-zone');
    if (zone) { zone.classList.add('active'); setTimeout(() => zone.classList.remove('active'), 250); }
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  });

  // ----- HINT -----
  let hintHtml = '键盘字母区：<kbd>a</kbd>–<kbd>z</kbd>';
  specialBindings.forEach(({ key, upper }) => {
    hintHtml += ` &nbsp; <kbd>${key === '\\' ? '\\\\' : key}</kbd>→${upper}`;
  });
  document.getElementById('keyboardHint').innerHTML = hintHtml;
</script>
</body>
</html>
